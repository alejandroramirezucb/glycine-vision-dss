name: glycine_vision_dss
description: Soybean disease diagnosis system with local ML inference.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  image: ^4.2.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  http: ^1.2.2
  tflite_flutter: ^0.12.1
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
